  /api/v1/reviews/{id}/rating:
    get:
      tags:
      - api
      summary: Retrieve rating information about a specific toilet by its ID.
      description: Retrieve rating information about a specific toilet by its ID.
      operationId: get-toilet-rating
      parameters:
      - name: id
        in: path
        description: Unique identifier of the toilet.
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-reviews-id-rating-2058800511"
              examples:
                get-toilet-rating:
                  value: "{\"avgStars\":3.1,\"avgCleanliness\":2.3,\"avgToiletPaper\"\
                    :2.5,\"avgWaterPressure\":2.4,\"avgHotWater\":2.5,\"avgSafety\"\
                    :2.3}"
components:
  schemas:
    api-v1-reviews-id973051148:
      type: object
      properties:
        comment:
          type: string
          description: Optional comment about the toilet.
        stars:
          type: number
          description: Star rating for the toilet (1 to 5).
        likes:
          type: object
          properties:
            safety:
              type: boolean
              description: Indicates if the reviewer felt safe using the toilet.
            waterPressure:
              type: boolean
              description: Indicates if the reviewer liked the water pressure.
            toiletPaper:
              type: boolean
              description: Indicates if the reviewer liked the availability of toilet
                paper.
            hotWater:
              type: boolean
              description: Indicates if the reviewer liked the availability of hot
                water.
            cleanliness:
              type: boolean
              description: Indicates if the reviewer liked the cleanliness of the
                toilet.
    api-v1-reviews-id181444805:
      type: array
      description: List of items
      items:
        type: object
        properties:
          createdAt:
            type: string
            description: Timestamp when the review was created.
          safety:
            type: boolean
            description: Indicates if safety was liked.
          waterPressure:
            type: boolean
            description: Indicates if water pressure was liked.
          toiletPaper:
            type: boolean
            description: Indicates if toilet paper availability was liked.
          comment:
            type: string
            description: Comment provided in the review.
          stars:
            type: number
            description: Star rating given in the review.
          hotWater:
            type: boolean
            description: Indicates if hot water availability was liked.
          cleanliness:
            type: boolean
            description: Indicates if cleanliness was liked.
        description: List of items
    api-v1-toilets1884267738:
      type: array
      description: List of items
      items:
        type: object
        properties:
          coord:
            type: object
            properties:
              lng:
                type: number
                description: Longitude of the toilet.
              lat:
                type: number
                description: Latitude of the toilet.
          name:
            type: string
            description: Name of the toilet.
          id:
            type: number
            description: Unique identifier of the toilet.
        description: List of items
    api-v1-reviews-id-rating-2058800511:
      type: object
      properties:
        avgHotWater:
          type: number
          description: Average hot water availability rating.
        avgStars:
          type: number
          description: Average star rating of the toilet.
        avgSafety:
          type: number
          description: Average safety rating.
        avgToiletPaper:
          type: number
          description: Average toilet paper availability rating.
        avgWaterPressure:
          type: number
          description: Average water pressure rating.
        avgCleanliness:
          type: number
          description: Average cleanliness rating.
