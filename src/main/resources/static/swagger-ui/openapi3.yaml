      - name: id
        in: path
        description: Unique identifier of the toilet.
        required: true
        schema:
          type: string
      - name: size
        in: query
        description: Number of reviews to retrieve per page. Default is 10.
        required: false
        schema:
          type: string
      - name: index
        in: query
        description: Page index for pagination. Default is 0.
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
