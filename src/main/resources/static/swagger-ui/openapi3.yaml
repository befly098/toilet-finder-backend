openapi: 3.0.1
info:
  title: My API
  description: My API description
  version: 0.1.0
servers:
- url: http://localhost:8080
tags: []
paths:
  /api/v1/toilets:
    get:
      tags:
      - api
      summary: Retrieve a list of toilets near the specified latitude and longitude.
      description: Retrieve a list of toilets near the specified latitude and longitude.
      operationId: get-toilets
      parameters:
      - name: lat
        in: query
        description: Latitude of the location to search nearby toilets.
        required: true
        schema:
          type: string
      - name: lng
        in: query
        description: Longitude of the location to search nearby toilets.
        required: true
        schema:
          type: string
      - name: radius
        in: query
        description: Radius (in meters) to search for nearby toilets. Default is 5000
          meters.
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-toilets1884267738"
              examples:
                get-toilets:
                  value: "[{\"id\":10,\"name\":\"여의도 공원 화장실\",\"coord\":{\"lat\":37.52809928072327,\"\
                    lng\":126.92249804735184}},{\"id\":1,\"name\":\"강남역 공중화장실\",\"\
                    coord\":{\"lat\":37.497900612830904,\"lng\":127.02860087156296}},{\"\
