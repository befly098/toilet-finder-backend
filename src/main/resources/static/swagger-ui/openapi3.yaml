                    lng\":127.0372000336647}},{\"id\":3,\"name\":\"선릉역 10번출구 화장실\"\
                    ,\"coord\":{\"lat\":37.50459988085503,\"lng\":127.04849749803543}},{\"\
                    id\":4,\"name\":\"삼성역 코엑스몰 화장실\",\"coord\":{\"lat\":37.512399217862324,\"\
                    lng\":127.05919951200485}},{\"id\":9,\"name\":\"건대입구역 스타시티 화장실\
                    \",\"coord\":{\"lat\":37.53999979656636,\"lng\":127.07040041685104}},{\"\
                    id\":7,\"name\":\"홍대입구역 9번출구 화장실\",\"coord\":{\"lat\":37.55709902550726,\"\
                    lng\":126.92369967699051}},{\"id\":8,\"name\":\"신촌역 공중화장실\",\"\
